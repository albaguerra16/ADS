<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>American Direct</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Montserrat', system-ui, sans-serif; background: #F5F3EE; }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
input[type=number] { -moz-appearance: textfield; }
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#888;font-size:13px">Cargando...</div></div>
<script>
// Make Recharts components available
const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, Cell, LineChart, Line } = Recharts;
</script>
<script type="text/babel" data-presets="react">

const storage = {
  get(key) { try { const v=localStorage.getItem(key); return v?{value:v}:null } catch{return null} },
  set(key,value) { try{localStorage.setItem(key,value);return true}catch{return false} },
  delete(key) { try{localStorage.removeItem(key);return true}catch{return false} },
  list(prefix='') { try{const keys=Object.keys(localStorage).filter(k=>k.startsWith(prefix));return{keys}}catch{return{keys:[]}} }
};



const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre']
const MESES_C = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']

const fmt = v => Math.round(v || 0).toLocaleString('es-CO')
const n = v => parseFloat(v) || 0
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2)

const EMPTY_V = { cliente: '', producto: '', venta: '', costoProducto: '', envioTotal: '', envioCliente: '' }
const EMPTY_G = { bolsas: '', metaAds: '', suscripciones: '', viajesMiami: '', otros: '' }

function calcV(v) {
  const venta = n(v.venta), cp = n(v.costoProducto)
  const et = n(v.envioTotal), ec = n(v.envioCliente)
  const em = Math.max(et - ec, 0)
  const costo = cp + em
  const gan = venta - costo
  return { venta, cp, et, ec, em, costo, gan, margen: venta > 0 ? gan/venta*100 : 0 }
}

function Dashboard() {
  const hoy = new Date()
  const [year, setYear] = useState(hoy.getFullYear())
  const [month, setMonth] = useState(hoy.getMonth())
  const [tab, setTab] = useState('ventas')
  const [ventas, setVentas] = useState([])
  const [gastos, setGastos] = useState(EMPTY_G)
  const [allV, setAllV] = useState({})
  const [allG, setAllG] = useState({})
  const [showForm, setShowForm] = useState(false)
  const [form, setForm] = useState(EMPTY_V)
  const [editId, setEditId] = useState(null)
  const [saving, setSaving] = useState(false)

  const vk = `ad_v_${year}_${String(month+1).padStart(2,'0')}`
  const gk = `ad_g_${year}_${String(month+1).padStart(2,'0')}`

  useEffect(() => {
    // load all keys for chart
    const av = {}, ag = {}
    storage.list('ad_v_').keys.forEach(k => { const r = storage.get(k); if (r) try { av[k] = JSON.parse(r.value) } catch {} })
    storage.list('ad_g_').keys.forEach(k => { const r = storage.get(k); if (r) try { ag[k] = JSON.parse(r.value) } catch {} })
    setAllV(av); setAllG(ag)
  }, [])

  useEffect(() => {
    const rv = storage.get(vk), rg = storage.get(gk)
    setVentas(rv ? JSON.parse(rv.value) : [])
    setGastos(rg ? { ...EMPTY_G, ...JSON.parse(rg.value) } : EMPTY_G)
  }, [year, month])

  function saveVentas(data) {
    setSaving(true)
    storage.set(vk, JSON.stringify(data))
    setAllV(p => ({ ...p, [vk]: data }))
    setTimeout(() => setSaving(false), 500)
  }
  function saveGastos(data) {
    storage.set(gk, JSON.stringify(data))
    setAllG(p => ({ ...p, [gk]: data }))
  }

  const prevMes = () => { if (month===0){setMonth(11);setYear(y=>y-1)}else setMonth(m=>m-1) }
  const nextMes = () => { if (month===11){setMonth(0);setYear(y=>y+1)}else setMonth(m=>m+1) }

  function saveVenta() {
    if (!form.cliente || !form.venta) return
    const entry = { id: editId || uid(), ...form }
    const nuevo = editId ? ventas.map(v => v.id===editId ? entry : v) : [...ventas, entry]
    setVentas(nuevo); saveVentas(nuevo)
    setShowForm(false); setForm(EMPTY_V); setEditId(null)
  }

  function changeGasto(field, val) {
    const ng = { ...gastos, [field]: val }
    setGastos(ng); saveGastos(ng)
  }

  // Aggregates
  const agg = ventas.reduce((a, v) => {
    const c = calcV(v)
    return { ...a, ventas: a.ventas+c.venta, cp: a.cp+c.cp, et: a.et+c.et, ec: a.ec+c.ec, em: a.em+c.em, costo: a.costo+c.costo, gan: a.gan+c.gan }
  }, { ventas:0, cp:0, et:0, ec:0, em:0, costo:0, gan:0 })

  const gastosFijos = Object.values(gastos).reduce((s,v) => s+n(v), 0)
  const neta = agg.gan - gastosFijos
  const margen = agg.ventas > 0 ? neta/agg.ventas*100 : 0
  const mc = margen >= 20 ? '#059669' : margen >= 10 ? '#d97706' : '#dc2626'

  const chartData = Array.from({length:6}, (_,i) => {
    let m=month-(5-i), y=year; while(m<0){m+=12;y--}
    const cvk=`ad_v_${y}_${String(m+1).padStart(2,'0')}`, cgk=`ad_g_${y}_${String(m+1).padStart(2,'0')}`
    const vs=allV[cvk]||[], gs=allG[cgk]||{}
    const tv=vs.reduce((s,v)=>s+n(v.venta),0)
    const gb=vs.reduce((s,v)=>{const c=calcV(v);return s+c.gan},0)
    const go=Object.values(gs).reduce((s,v)=>s+n(v),0)
    return {label:MESES_C[m], neta: tv>0 ? gb-go : null}
  })

  const lc = calcV(form)

  return (
    <div>
      {/* MES */}
      <div style={{background:'#fff',borderBottom:'1px solid #E8E5DF',padding:'11px 18px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <button onClick={prevMes} style={nbS}>‹</button>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:16,fontWeight:700,color:'#1a1a2e'}}>{MESES[month]} {year}</div>
          <div style={{fontSize:10,color:'#bbb',marginTop:1}}>{ventas.length} ventas · ${fmt(agg.ventas)} COP {saving && '· Guardando...'}</div>
        </div>
        <button onClick={nextMes} style={nbS}>›</button>
      </div>

      {/* SUBTABS */}
      <div style={{background:'#fff',borderBottom:'1px solid #E8E5DF',display:'flex'}}>
        {[['ventas','📋 Ventas'],['envios','📦 Envíos'],['resumen','📊 Resumen']].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:'11px 4px',border:'none',borderBottom:tab===id?'3px solid #0D1F4A':'3px solid transparent',background:'none',cursor:'pointer',fontSize:11,fontWeight:700,color:tab===id?'#0D1F4A':'#aaa',letterSpacing:'.04em',transition:'all .15s'}}>{label}</button>
        ))}
      </div>

      <div style={{padding:'14px 14px 20px',maxWidth:680,margin:'0 auto'}}>

        {/* VENTAS TAB */}
        {tab==='ventas' && <>
          {ventas.length>0 && (
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:14}}>
              <MC label="Ventas" val={`$${fmt(agg.ventas)}`} c="#0D1F4A"/>
              <MC label="Costo real" val={`$${fmt(agg.costo)}`} c="#C8102E"/>
              <MC label="Ganancia" val={`$${fmt(agg.gan)}`} c="#059669"/>
            </div>
          )}
          <button onClick={()=>{setForm(EMPTY_V);setEditId(null);setShowForm(true)}} style={{width:'100%',padding:13,background:'#0D1F4A',color:'#fff',border:'none',borderRadius:10,fontSize:13,fontWeight:700,cursor:'pointer',marginBottom:14}}>
            + Agregar venta
          </button>

          {showForm && (
            <div style={{background:'#fff',borderRadius:12,border:'2px solid #0D1F4A',padding:16,marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:700,color:'#0D1F4A',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:14}}>{editId?'Editar venta':'Nueva venta'}</div>
              <FF label="Cliente *" val={form.cliente} set={v=>setForm(f=>({...f,cliente:v}))} ph="ej: ISAURA"/>
              <FF label="Producto (opcional)" val={form.producto} set={v=>setForm(f=>({...f,producto:v}))} ph="ej: Nike Air Max"/>
              <Div label="Precios"/>
              <FF label="Precio de venta al cliente (COP) *" val={form.venta} set={v=>setForm(f=>({...f,venta:v}))} ph="ej: 670000" type="number"/>
              <FF label="Costo del producto (COP)" val={form.costoProducto} set={v=>setForm(f=>({...f,costoProducto:v}))} ph="ej: 450000" type="number"/>
              <Div label="Envío — ¿quién paga qué?"/>
              <FF label="Envío total casillero (COP)" val={form.envioTotal} set={v=>setForm(f=>({...f,envioTotal:v}))} ph="ej: 80000" type="number" hint="Costo real que cobró el casillero"/>
              <FF label="Envío cobrado al cliente (COP)" val={form.envioCliente} set={v=>setForm(f=>({...f,envioCliente:v}))} ph="ej: 30000" type="number" hint="Parte incluida en el precio de venta"/>
              {(n(form.venta)>0||n(form.envioTotal)>0) && (
                <div style={{background:'#F0F5FF',borderRadius:10,padding:'12px 14px',marginBottom:12}}>
                  <div style={{fontSize:9,fontWeight:700,color:'#0D1F4A',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:8}}>Vista previa</div>
                  {[['Precio de venta',`$${fmt(lc.venta)}`],['Costo producto',`−$${fmt(lc.cp)}`,true],lc.em>0&&[`Envío mío (${fmt(lc.et)}−${fmt(lc.ec)})`,`−$${fmt(lc.em)}`,true]].filter(Boolean).map(([l,v,r])=>(
                    <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'2px 0'}}><span style={{fontSize:11,color:'#555'}}>{l}</span><span style={{fontSize:11,fontWeight:500,color:r?'#C8102E':'#1a1a2e'}}>{v}</span></div>
                  ))}
                  <div style={{height:1,background:'#C8D8F0',margin:'8px 0'}}/>
                  <div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontSize:12,fontWeight:700,color:'#0D1F4A'}}>Ganancia</span><span style={{fontSize:14,fontWeight:700,color:lc.gan>=0?'#059669':'#dc2626'}}>${fmt(lc.gan)} ({lc.margen.toFixed(1)}%)</span></div>
                </div>
              )}
              <div style={{display:'flex',gap:8}}>
                <button onClick={saveVenta} style={{flex:2,padding:11,background:'#0D1F4A',color:'#fff',border:'none',borderRadius:8,fontSize:13,fontWeight:700,cursor:'pointer'}}>{editId?'Guardar cambios':'Agregar'}</button>
                <button onClick={()=>{setShowForm(false);setForm(EMPTY_V);setEditId(null)}} style={{flex:1,padding:11,background:'#f4f5f7',color:'#666',border:'none',borderRadius:8,fontSize:13,cursor:'pointer'}}>Cancelar</button>
              </div>
            </div>
          )}

          {ventas.length===0 ? (
            <div style={{textAlign:'center',padding:'40px 20px',color:'#bbb'}}>
              <div style={{fontSize:32,marginBottom:8}}>📋</div>
              <div style={{fontSize:13}}>Sin ventas este mes</div>
            </div>
          ) : (
            <div style={{background:'#fff',borderRadius:12,border:'1px solid #E8E5DF',overflow:'hidden'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 70px 70px 70px 36px',padding:'8px 12px',background:'#0D1F4A'}}>
                {['Cliente','Venta','Costo','Gan.',''].map((h,i)=>(
                  <div key={i} style={{fontSize:9,fontWeight:700,color:'rgba(255,255,255,.55)',letterSpacing:'.1em',textTransform:'uppercase',textAlign:i>0?'right':'left'}}>{h}</div>
                ))}
              </div>
              {ventas.map((v,i)=>{
                const c=calcV(v)
                return (
                  <div key={v.id} style={{display:'grid',gridTemplateColumns:'1fr 70px 70px 70px 36px',padding:'11px 12px',borderBottom:i<ventas.length-1?'1px solid #F4F2EE':'none',alignItems:'center'}}>
                    <div>
                      <div style={{fontSize:13,fontWeight:600,color:'#1a1a2e'}}>{v.cliente}</div>
                      {v.producto&&<div style={{fontSize:10,color:'#aaa',marginTop:1}}>{v.producto}</div>}
                      {c.em>0&&<div style={{fontSize:9,color:'#d97706',marginTop:2}}>📦 Envío mío: ${fmt(c.em)}</div>}
                    </div>
                    <div style={{textAlign:'right',fontSize:12,fontWeight:500}}>${fmt(c.venta)}</div>
                    <div style={{textAlign:'right',fontSize:12,color:'#C8102E'}}>${fmt(c.costo)}</div>
                    <div style={{textAlign:'right',fontSize:12,fontWeight:700,color:c.gan>=0?'#059669':'#dc2626'}}>${fmt(c.gan)}</div>
                    <div style={{display:'flex',flexDirection:'column',gap:3,alignItems:'flex-end'}}>
                      <button onClick={()=>{setForm({cliente:v.cliente,producto:v.producto||'',venta:v.venta,costoProducto:v.costoProducto||'',envioTotal:v.envioTotal||'',envioCliente:v.envioCliente||''});setEditId(v.id);setShowForm(true)}} style={{background:'none',border:'none',cursor:'pointer',fontSize:13,padding:'0 2px'}}>✏️</button>
                      <button onClick={()=>{const nd=ventas.filter(x=>x.id!==v.id);setVentas(nd);saveVentas(nd)}} style={{background:'none',border:'none',cursor:'pointer',fontSize:13,padding:'0 2px'}}>🗑️</button>
                    </div>
                  </div>
                )
              })}
              <div style={{display:'grid',gridTemplateColumns:'1fr 70px 70px 70px 36px',padding:'11px 12px',background:'#F5F3EE',borderTop:'2px solid #E8E5DF'}}>
                <div style={{fontSize:11,fontWeight:700,color:'#666',letterSpacing:'.08em',textTransform:'uppercase'}}>TOTAL</div>
                <div style={{textAlign:'right',fontSize:12,fontWeight:700}}>${fmt(agg.ventas)}</div>
                <div style={{textAlign:'right',fontSize:12,fontWeight:700,color:'#C8102E'}}>${fmt(agg.costo)}</div>
                <div style={{textAlign:'right',fontSize:12,fontWeight:700,color:'#059669'}}>${fmt(agg.gan)}</div>
                <div/>
              </div>
            </div>
          )}
        </>}

        {/* ENVIOS TAB */}
        {tab==='envios' && <>
          <div style={{background:'#fff',borderRadius:12,border:'1px solid #E8E5DF',overflow:'hidden',marginBottom:14}}>
            <div style={{padding:'12px 15px',background:'#0D1F4A'}}>
              <div style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,.7)',letterSpacing:'.1em',textTransform:'uppercase'}}>Resumen de envíos — {MESES[month]}</div>
            </div>
            <ER label="Envío total pagado al casillero" val={agg.et} color="#1a1a2e" big/>
            <ER label="Envío cobrado a clientes" val={agg.ec} color="#059669" sub="Recuperado — incluido en el precio de venta"/>
            <ER label="Envío a mi cargo (absorbí yo)" val={agg.em} color="#C8102E" sub="Sale de mi bolsillo — reduce mi ganancia"/>
            {agg.et>0&&(
              <div style={{padding:'12px 15px',borderTop:'1px solid #F4F2EE'}}>
                <div style={{fontSize:10,color:'#aaa',fontWeight:600,marginBottom:8,letterSpacing:'.06em',textTransform:'uppercase'}}>¿Cómo se dividió?</div>
                <div style={{height:10,background:'#f0f0ee',borderRadius:5,overflow:'hidden',display:'flex'}}>
                  <div style={{width:`${agg.ec/agg.et*100}%`,background:'#059669',transition:'width .4s'}}/>
                  <div style={{flex:1,background:'#C8102E'}}/>
                </div>
                <div style={{display:'flex',justifyContent:'space-between',marginTop:8,fontSize:11}}>
                  <span style={{color:'#059669',fontWeight:600}}>Cliente pagó {(agg.ec/agg.et*100).toFixed(0)}%</span>
                  <span style={{color:'#C8102E',fontWeight:600}}>Yo absorbí {(agg.em/agg.et*100).toFixed(0)}%</span>
                </div>
              </div>
            )}
          </div>
          {ventas.filter(v=>n(v.envioTotal)>0).map((v,i,arr)=>{
            const c=calcV(v)
            return (
              <div key={v.id} style={{background:'#fff',borderRadius:10,border:'1px solid #E8E5DF',padding:'12px 14px',marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                  <div><div style={{fontSize:13,fontWeight:600,color:'#1a1a2e'}}>{v.cliente}</div>{v.producto&&<div style={{fontSize:10,color:'#aaa'}}>{v.producto}</div>}</div>
                  <span style={{fontSize:13,fontWeight:700}}>Total: ${fmt(c.et)}</span>
                </div>
                <div style={{display:'flex',gap:16,marginBottom:6}}>
                  <span style={{fontSize:12,color:'#059669',fontWeight:600}}>↑ Cliente: ${fmt(c.ec)}</span>
                  <span style={{fontSize:12,color:'#C8102E',fontWeight:600}}>↓ Yo: ${fmt(c.em)}</span>
                </div>
                {c.et>0&&<div style={{height:6,background:'#f0f0ee',borderRadius:3,overflow:'hidden',display:'flex'}}><div style={{width:`${c.ec/c.et*100}%`,background:'#059669'}}/><div style={{flex:1,background:'#C8102E'}}/></div>}
              </div>
            )
          })}
          {ventas.filter(v=>n(v.envioTotal)>0).length===0&&<div style={{textAlign:'center',padding:'40px 20px',color:'#bbb'}}><div style={{fontSize:32,marginBottom:8}}>📦</div><div style={{fontSize:13}}>Agrega ventas con envío para ver el desglose</div></div>}
        </>}

        {/* RESUMEN TAB */}
        {tab==='resumen' && <>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
            <Card label="Ventas totales" val={`$${fmt(agg.ventas)}`} sub={`${ventas.length} productos`} accent="#0D1F4A"/>
            <Card label="Ganancia neta" val={`$${fmt(neta)}`} sub={`Margen ${margen.toFixed(1)}%`} accent={mc} border={`2px solid ${mc}`}/>
            <Card label="Ganancia bruta" val={`$${fmt(agg.gan)}`} sub="Antes de gastos fijos" accent="#555"/>
            <Card label="Envío absorbido" val={`$${fmt(agg.em)}`} sub="Sale de mi ganancia" accent="#d97706"/>
          </div>

          {agg.ventas>0&&(
            <div style={{background:'#fff',borderRadius:10,padding:'13px 15px',marginBottom:14,border:'1px solid #E8E5DF'}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:10,marginBottom:8}}>
                <span style={{color:'#888',fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase'}}>Distribución del ingreso</span>
                <span style={{color:mc,fontWeight:700,fontSize:12}}>Margen {margen.toFixed(1)}%</span>
              </div>
              <div style={{height:12,background:'#f0f0ee',borderRadius:6,overflow:'hidden',display:'flex'}}>
                <div style={{width:`${Math.min(agg.costo/agg.ventas*100,100)}%`,background:'#C8102E',transition:'width .4s'}}/>
                <div style={{width:`${Math.min(gastosFijos/agg.ventas*100,100)}%`,background:'#f59e0b',transition:'width .4s'}}/>
                <div style={{flex:1,background:margen>0?'#0D1F4A':'#dc2626'}}/>
              </div>
              <div style={{display:'flex',gap:12,marginTop:8,flexWrap:'wrap'}}>
                {[['#C8102E','Costo mercancía'],['#f59e0b','Gastos fijos'],[margen>0?'#0D1F4A':'#dc2626','Ganancia']].map(([c,l])=>(
                  <div key={l} style={{display:'flex',alignItems:'center',gap:5}}><div style={{width:8,height:8,borderRadius:2,background:c}}/><span style={{fontSize:10,color:'#888'}}>{l}</span></div>
                ))}
              </div>
            </div>
          )}

          <div style={{background:'#fff',borderRadius:10,border:'1px solid #E8E5DF',overflow:'hidden',marginBottom:14}}>
            <div style={{padding:'10px 15px 8px',fontSize:10,fontWeight:700,color:'#bbb',letterSpacing:'.12em',textTransform:'uppercase',borderBottom:'1px solid #F4F2EE'}}>Gastos operativos del mes</div>
            {[['bolsas','Bolsas y empaque'],['metaAds','Meta Ads / Instagram'],['suscripciones','Suscripciones (Canva, etc.)'],['viajesMiami','Viajes a Miami'],['otros','Otros gastos']].map(([f,l],i,arr)=>(
              <div key={f} style={{display:'flex',alignItems:'center',padding:'11px 15px',borderBottom:i<arr.length-1?'1px solid #F8F6F2':'none',gap:8}}>
                <span style={{flex:1,fontSize:13,color:'#444'}}>{l}</span>
                <div style={{display:'flex',alignItems:'center',gap:5}}>
                  <span style={{fontSize:12,color:'#ccc'}}>$</span>
                  <input type="number" inputMode="decimal" value={gastos[f]} onChange={e=>changeGasto(f,e.target.value)} placeholder="0" style={{width:110,textAlign:'right',border:'1px solid #E2DED8',borderRadius:7,padding:'7px 9px',fontSize:14,fontWeight:600,color:'#1a1a2e',background:'#fafaf8',outline:'none'}}/>
                  <span style={{fontSize:10,color:'#bbb',minWidth:28}}>COP</span>
                </div>
              </div>
            ))}
            {gastosFijos>0&&<div style={{padding:'10px 15px',background:'#FFFBEB',fontSize:12,color:'#92400E',fontWeight:600,borderTop:'1px solid #F4F2EE'}}>Total: <strong>${fmt(gastosFijos)} COP</strong></div>}
          </div>

          {agg.ventas>0&&(

const f = n => Math.round(n).toLocaleString('es-CO')
const n = v => parseFloat(v) || 0

const COLORS = ['#1B3A8B', '#C8102E', '#1B3A8B', '#C8102E']

function Calculadora() {
  const [trm, setTrm] = useState('4280')
  const [redespacho, setRedespacho] = useState('3')
  const [boxVal, setBoxVal] = useState('35')
  const [products, setProducts] = useState([
    { price: '95', shipping: '15.91', margin: '130000' },
    { price: '120', shipping: '19.09', margin: '180000' },
  ])
  const [copied, setCopied] = useState(null)

  function autoDistribute() {
    const box = n(boxVal)
    const total = products.reduce((s, p) => s + n(p.price), 0)
    setProducts(products.map(p => ({
      ...p,
      shipping: total > 0 ? (n(p.price) / total * box).toFixed(2) : (box / products.length).toFixed(2)
    })))
  }

  function updateProduct(i, field, val) {
    setProducts(prev => prev.map((p, idx) => idx === i ? { ...p, [field]: val } : p))
  }

  function addProduct() {
    setProducts(prev => [...prev, { price: '', shipping: '', margin: '150000' }])
  }

  function removeProduct(i) {
    setProducts(prev => prev.filter((_, idx) => idx !== i))
  }

  function calcProduct(p) {
    const trmV = n(trm) || 4280
    const red = n(redespacho) / products.length
    const price = n(p.price)
    const ship = n(p.shipping)
    const margin = n(p.margin)
    const applyCustoms = price > 200
    let customs = 0
    if (applyCustoms) {
      const cif = price + ship
      const arancel = cif * 0.10
      customs = arancel + (cif + arancel) * 0.19
    }
    const costUSD = price + ship + red + customs
    const costCOP = costUSD * trmV
    const sell = costCOP + margin
    const mp = sell > 0 ? (margin / sell * 100) : 0
    return { costUSD, costCOP, sell, mp, customs, applyCustoms, red }
  }

  const totals = products.reduce((acc, p) => {
    const c = calcProduct(p)
    return { inv: acc.inv + c.costUSD, gain: acc.gain + n(p.margin), rec: acc.rec + c.sell }
  }, { inv: 0, gain: 0, rec: 0 })

  function copyPrice(i, sell) {
    navigator.clipboard.writeText(`$${f(sell)} COP`).catch(() => {})
    setCopied(i)
    setTimeout(() => setCopied(null), 1500)
  }

  return (
    <div style={{ padding: '14px 14px 20px', maxWidth: 680, margin: '0 auto' }}>

      {/* TRM + REDESPACHO */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 14 }}>
        <Field label="TRM del día (COP/USD)">
          <input type="number" value={trm} onChange={e => setTrm(e.target.value)} style={inputStyle} />
        </Field>
        <Field label="Redespacho Riohacha (USD total)">
          <input type="number" value={redespacho} onChange={e => setRedespacho(e.target.value)} style={inputStyle} />
        </Field>
      </div>

      {/* BOX HELPER */}
      <div style={{ background: '#fff', border: '1px solid #E2DED8', borderRadius: 10, padding: '12px 14px', marginBottom: 14 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap' }}>
          <span style={{ fontSize: 12, color: '#666', fontWeight: 500, whiteSpace: 'nowrap' }}>Caja casillero:</span>
          <select value={boxVal} onChange={e => setBoxVal(e.target.value)} style={{ ...inputStyle, flex: 1, minWidth: 150 }}>
            <option value="17">Hasta 3 lbs — $17</option>
            <option value="27">Hasta 5 lbs — $27</option>
            <option value="35">Hasta 10 lbs — $35</option>
          </select>
          <button onClick={autoDistribute} style={{ padding: '8px 14px', background: '#1B3A8B', color: '#fff', border: 'none', borderRadius: 7, fontSize: 12, fontWeight: 600, cursor: 'pointer', whiteSpace: 'nowrap' }}>
            ↻ Distribuir envío
          </button>
        </div>
        <p style={{ fontSize: 10, color: '#bbb', marginTop: 8 }}>
          Distribuye el costo proporcionalmente. Puedes editar cada producto después.
        </p>
      </div>

      {/* PRODUCT CARDS */}
      <div style={{ display: 'grid', gridTemplateColumns: products.length > 1 ? '1fr 1fr' : '1fr', gap: 12, marginBottom: 12 }}>
        {products.map((p, i) => {
          const c = calcProduct(p)
          const badgeColor = c.mp >= 20 ? '#059669' : c.mp >= 12 ? '#d97706' : '#dc2626'
          const badgeBg = c.mp >= 20 ? '#D1FAE5' : c.mp >= 12 ? '#FFF3CD' : '#FEE2E2'
          return (
            <div key={i} style={{ background: '#fff', border: '1px solid #E2DED8', borderRadius: 12, overflow: 'hidden' }}>
              {/* Header */}
              <div style={{ background: COLORS[i % 2], padding: '12px 13px' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 9 }}>
                  <span style={{ fontSize: 11, fontWeight: 700, color: 'rgba(255,255,255,.85)', letterSpacing: '.05em' }}>Producto {i + 1}</span>
                  {products.length > 1 && (
                    <button onClick={() => removeProduct(i)} style={{ background: 'none', border: 'none', color: 'rgba(255,255,255,.45)', cursor: 'pointer', fontSize: 15, padding: '0 2px' }}>✕</button>
                  )}
                </div>
                {[
                  { label: 'Precio', field: 'price', suffix: 'USD' },
                  { label: 'Envío casillero', field: 'shipping', suffix: 'USD' },
                  { label: 'Ganancia', field: 'margin', suffix: 'COP' },
                ].map(({ label, field, suffix }) => (
                  <div key={field} style={{ display: 'flex', alignItems: 'center', background: 'rgba(255,255,255,.15)', borderRadius: 7, padding: '6px 9px', marginBottom: 6 }}>
                    <span style={{ fontSize: 10, color: 'rgba(255,255,255,.55)', minWidth: 70, fontWeight: 500 }}>{label}</span>
                    <input
                      type="number"
                      value={p[field]}
                      onChange={e => updateProduct(i, field, e.target.value)}
                      placeholder="0"
                      style={{ background: 'transparent', border: 'none', color: '#fff', fontSize: 14, fontWeight: 700, flex: 1, outline: 'none', minWidth: 0, textAlign: 'right' }}
                    />
                    <span style={{ fontSize: 10, color: 'rgba(255,255,255,.4)', marginLeft: 5 }}>{suffix}</span>
                  </div>
                ))}
              </div>
              {/* Body */}
              <div style={{ padding: '11px 13px' }}>
                {[
                  ['Precio USD', `$${n(p.price).toFixed(2)} USD`],
                  ['Envío casillero', `−$${n(p.shipping).toFixed(2)} USD`],
                  ['Redespacho', `−$${c.red.toFixed(2)} USD`],
                  ...(c.applyCustoms ? [['Aduana (10%+IVA)', `−$${c.customs.toFixed(2)} USD`]] : []),
                ].map(([l, v]) => (
                  <div key={l} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, padding: '3px 0', borderBottom: '1px solid #F4F2EE', color: v.includes('−') ? '#C8102E' : '#666' }}>
                    <span style={{ color: '#888' }}>{l}</span><span style={{ fontWeight: 500 }}>{v}</span>
                  </div>
                ))}
                {c.applyCustoms && (
                  <div style={{ fontSize: 10, padding: '4px 7px', borderRadius: 5, background: '#FFF3CD', color: '#856404', margin: '4px 0' }}>Aplica aduana — supera $200 USD</div>
                )}
                {!c.applyCustoms && (
                  <div style={{ fontSize: 10, padding: '4px 7px', borderRadius: 5, background: '#D1FAE5', color: '#065F46', margin: '4px 0' }}>Sin aduana — bajo $200 USD</div>
                )}
                <div style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 0 2px', borderTop: '1px solid #eee', marginTop: 4 }}>
                  <span style={{ fontSize: 12, color: '#888' }}>Costo en COP</span>
                  <span style={{ fontSize: 13, fontWeight: 700, color: '#1B3A8B' }}>${f(c.costCOP)}</span>
                </div>
                <div style={{ fontSize: 26, fontWeight: 700, color: '#1a1a2e', textAlign: 'center', margin: '8px 0 2px' }}>
                  ${f(c.sell)}
                </div>
                <div style={{ fontSize: 10, color: '#aaa', textAlign: 'center', marginBottom: 6 }}>precio de venta sugerido</div>
                <div style={{ padding: '5px 10px', borderRadius: 20, fontSize: 10, fontWeight: 600, textAlign: 'center', background: badgeBg, color: badgeColor, marginBottom: 8 }}>
                  Margen {c.mp.toFixed(1)}% · Ganancia ${f(n(p.margin))} COP
                </div>
                <button onClick={() => copyPrice(i, c.sell)} style={{ width: '100%', padding: 8, background: 'transparent', border: '1px solid #E2DED8', borderRadius: 8, fontSize: 12, color: '#666', cursor: 'pointer' }}>
                  {copied === i ? '¡Copiado!' : 'Copiar precio'}
                </button>
              </div>
            </div>
          )
        })}
      </div>

      <button onClick={addProduct} style={{ width: '100%', padding: 10, background: 'transparent', border: '1.5px dashed #d0d4dc', borderRadius: 10, fontSize: 13, color: '#888', cursor: 'pointer', marginBottom: 14 }}>
        + Agregar otro producto
      </button>

      {/* SUMMARY */}
      <div style={{ background: '#1B3A8B', borderRadius: 12, padding: '14px 18px', display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8 }}>
        {[['Inversión total', `$${totals.inv.toFixed(0)} USD`], ['Ganancia total', `$${f(totals.gain)} COP`], ['Recaudo total', `$${f(totals.rec)} COP`]].map(([l, v]) => (
          <div key={l} style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 10, color: 'rgba(255,255,255,.55)', marginBottom: 3 }}>{l}</div>
            <div style={{ fontSize: 14, fontWeight: 700, color: '#fff' }}>{v}</div>
          </div>
        ))}
      </div>
    </div>
  )
}

                {layout==='b'&&<>

          </div>
        </div>
      </div>

      {result&&(

const S=({children})=><div style={{fontSize:9,fontWeight:700,letterSpacing:'.14em',color:'#bbb',textTransform:'uppercase',margin:'12px 0 6px',fontFamily:"'Montserrat',sans-serif"}}>{children}</div>
const UB=({onFile,prev,label,sm})=>(
  <div style={{border:'1.5px dashed #E2DED8',borderRadius:8,padding:sm?9:13,textAlign:'center',cursor:'pointer',background:'#fafafa',position:'relative',marginBottom:sm?0:7}}>
    <input type="file" accept="image/*" onChange={e=>onFile(e.target.files[0])} style={{position:'absolute',inset:0,opacity:0,cursor:'pointer',width:'100%',height:'100%'}}/>
    {prev?<img src={prev} style={{width:'100%',height:sm?42:58,objectFit:'contain',borderRadius:4}}/>:<div style={{fontSize:sm?10:11,color:'#ccc'}}>{sm?`+ ${label}`:`↑ ${label}`}</div>}
  </div>
)



const TABS = [

]

function App() {
  const [tab, setTab] = React.useState('dashboard')
  return (
    <div style={{ minHeight: '100vh', background: '#F5F3EE', paddingBottom: 70 }}>
      <div style={{ background: '#0D1F4A', padding: '14px 18px', display: 'flex', alignItems: 'center', gap: 10, position: 'sticky', top: 0, zIndex: 50 }}>
        <div style={{ width: 7, height: 7, borderRadius: '50%', background: '#C8102E', flexShrink: 0 }} />
        <span style={{ color: 'rgba(255,255,255,.8)', fontSize: 12, fontWeight: 700, letterSpacing: '.14em', textTransform: 'uppercase' }}>American Direct</span>
        <span style={{ marginLeft: 'auto', color: 'rgba(255,255,255,.35)', fontSize: 10, letterSpacing: '.1em', textTransform: 'uppercase' }}>
          {TABS.find(t => t.id === tab)?.label}
        </span>
      </div>
      <div style={{ display: tab === 'dashboard' ? 'block' : 'none' }}><Dashboard /></div>
      <div style={{ display: tab === 'calculadora' ? 'block' : 'none' }}><Calculadora /></div>
      <div style={{ display: tab === 'stories' ? 'block' : 'none' }}><StoryGenerator /></div>
      <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, background: '#fff', borderTop: '1px solid #E8E5DF', display: 'flex', height: 64, zIndex: 50, boxShadow: '0 -4px 20px rgba(0,0,0,.06)' }}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 4, border: 'none', cursor: 'pointer', background: 'none', borderTop: tab === t.id ? '2.5px solid #0D1F4A' : '2.5px solid transparent' }}>
            <span style={{ fontSize: 20 }}>{t.icon}</span>
            <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: '.08em', textTransform: 'uppercase', color: tab === t.id ? '#0D1F4A' : '#bbb' }}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />)

</script>
